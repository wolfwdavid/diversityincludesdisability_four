name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: E2E + axe (both modes, all routes) - hard WCAG gate
        run: pnpm test:e2e
      - name: Lighthouse budgets (base-less build/)
        run: pnpm exec lhci autorun --collect.chromeFlags="--no-sandbox"

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build (BASE_PATH for Pages)
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: pnpm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy2.outputs.page_url || steps.deploy1.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deploy2.outputs.page_url || steps.deploy1.outputs.page_url }}
    steps:
      - id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          timeout: 600000
      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30
      - id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Live smoke (with CDN-propagation retry)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 3
          max_attempts: 5
          retry_wait_seconds: 15
          command: node scripts/live-smoke.mjs "${{ needs.deploy.outputs.page_url }}"
